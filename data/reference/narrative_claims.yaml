# Narrative claims registry
# =========================
# Each claim is a numeric value quoted in narrative prose (paper_draft.md,
# talk-track.md, and — if referenced — slide source in epl-2goal-web). The
# validator reads this file, resolves each claim's canonical value from the
# given source, formats it per `display_format`, and verifies the resulting
# string appears in every listed narrative file.
#
# To add a new claim: append an entry — no code change needed.
#
# Schema per entry:
#   id              Stable slug used in logs / reports.
#   source_file     Path (relative to repo root) to the aggregate file that
#                   owns the truth.
#   source_path     Dot-path into the JSON. Supports list filter selectors:
#                     overall.win_rate
#                     by_bucket[bucket_key=76-90+].n
#                     by_season[season_key=2015-2016].win_rate
#   display_format  Python format spec used to render the value. Examples:
#                     "{:,}"        -> "1,907"
#                     "{:.1%}"      -> "93.3%"
#                     "{}"          -> "87"
#                     "{:.1f}x"     -> "66.7x"
#   display_aliases (optional) alternate strings that should also be accepted
#                   if found. Useful when the prose spells out numbers or
#                   uses different punctuation.
#   stale_forms     (optional) strings that MUST NOT appear in any listed
#                   narrative. Use to pin down known-wrong prior values.
#   narratives      List of files that quote this claim.

- id: overall_events
  source_file: data/output/descriptive_stats.json
  source_path: overall.n
  display_format: "{:,}"
  display_aliases: ["1907 events", "1907"]
  narratives:
    - docs/talk-track.md
    - docs/paper_draft.md

