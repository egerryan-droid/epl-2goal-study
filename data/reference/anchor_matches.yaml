# Anchor matches — goal-scorer ground truth for cross-checking Understat data.
#
# Each anchor gives canonical scorer and minute data from an authoritative
# external source (Premier League official, BBC, ESPN). The validator in
# scripts/13_full_validation.py looks up the match_key in
# data/processed/goal_timeline.csv and compares goal-by-goal:
#
#   - Scorer name mismatch  -> FAIL
#   - Goal count mismatch   -> FAIL
#   - Minute drift >= 3     -> FAIL
#   - Minute drift 1 or 2   -> WARN (Understat minutes are shot minutes and
#                                    often differ from official clock minutes)
#   - Exact match           -> PASS
#
# To add a new anchor: append a list entry with match_key, the four metadata
# fields, and a `goals:` list sorted by minute. No code change required.

- match_key: 18581
  description: "Southampton 4-4 Liverpool — 2022/23 season finale, 2023-05-28 (user-provided anchor)"
  home_team: Southampton
  away_team: Liverpool
  date: 2023-05-28
  final_home_goals: 4
  final_away_goals: 4
  goals:
    - {minute: 10, scorer: "Diogo Jota",         side: away}
    - {minute: 14, scorer: "Roberto Firmino",    side: away}
    - {minute: 19, scorer: "James Ward-Prowse",  side: home}
    - {minute: 28, scorer: "Kamaldeen Sulemana", side: home}
    - {minute: 48, scorer: "Kamaldeen Sulemana", side: home}
    - {minute: 64, scorer: "Adam Armstrong",     side: home}
    - {minute: 72, scorer: "Cody Gakpo",         side: away}
    - {minute: 73, scorer: "Diogo Jota",         side: away}

